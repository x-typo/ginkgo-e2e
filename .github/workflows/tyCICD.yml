name: Ginkgo E2E Tests
run-name: Ginkgo E2E Tests - ${{ github.run_number }}

on:
  workflow_dispatch:
  schedule:
    - cron: '0 7 * * *'

permissions:
  id-token: write
  contents: write
  issues: write
  checks: write
  pull-requests: write

jobs:

  run-e2e-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.6'

      - name: Cache Go modules
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-
          enableCrossOsArchive: true
            
      - name: Install dependencies
        run: go mod download

      - name: Install Ginkgo CLI
        run: go install github.com/onsi/ginkgo/v2/ginkgo

      - name: Install go-junit-report
        run: go install github.com/jstemmer/go-junit-report/v2@latest

      - name: Run Ginkgo E2E Tests and Generate Report
        run: go test -v -json ./tests | go-junit-report -set-exit-code > report.xml

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Ginkgo E2E Test Results
          path: report.xml
          reporter: jest-junit